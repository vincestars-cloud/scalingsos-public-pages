<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Your Account — ScalingSOS</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1f3a;--gold:#c9a84c;--gold-bg:rgba(201,168,76,.08);--gold-border:rgba(201,168,76,.30);--cream:#faf8f3;--gray:#6b7280;--line:rgba(10,31,58,.12);}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 18px;}
.card{background:#fff;border-radius:20px;max-width:480px;width:100%;box-shadow:0 30px 80px -25px rgba(10,31,58,.45);overflow:hidden;}
.head{background:var(--navy);padding:26px 30px;}
.brand{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.head h1{font-size:22px;font-weight:800;color:#fff;line-height:1.25;}
.head p{font-size:14px;color:rgba(255,255,255,.6);margin-top:8px;line-height:1.5;}
.body{padding:26px 30px 30px;}
label{display:block;font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin:0 0 6px;}
input{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;color:var(--navy);outline:none;transition:.15s;margin-bottom:14px;}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
.btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:16px;background:linear-gradient(to bottom,#22c55e,#15803d);color:#fff;font-size:15px;font-weight:800;border:none;border-radius:11px;cursor:pointer;font-family:inherit;box-shadow:0 10px 26px -8px rgba(21,128,61,.5);transition:transform .14s;}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.msg{font-size:14px;padding:12px 14px;border-radius:10px;margin-bottom:14px;display:none;line-height:1.5;}
.msg.ok{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;display:block;}
.msg.err{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;display:block;}
.tiles{display:flex;flex-direction:column;gap:12px;}
.tile{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);border-radius:12px;text-decoration:none;color:var(--navy);transition:.14s;cursor:pointer;}
.tile:hover{border-color:var(--gold);background:var(--gold-bg);}
.tile .ic{width:42px;height:42px;border-radius:10px;background:var(--gold-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tile h3{font-size:15px;font-weight:700;}
.tile p{font-size:13px;color:var(--gray);margin-top:2px;}
.tile .arw{margin-left:auto;color:var(--gray);}
.status{font-size:13px;color:var(--gray);margin:0 0 18px;display:flex;align-items:center;gap:8px;}
.status .b{font-weight:700;color:var(--navy);}
.hidden{display:none;}
footer{padding:18px;text-align:center;font-size:12px;color:rgba(10,31,58,.3);}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="brand">ScalingSOS</div>
      <h1 id="title">Access your website &amp; receptionist</h1>
      <p id="subtitle">Enter your email and we'll send you a secure sign-in link — no password needed.</p>
    </div>
    <div class="body">
      <div class="msg" id="msg"></div>

      <!-- request link -->
      <div id="requestView">
        <label>Your email</label>
        <input type="email" id="email" placeholder="you@yourbusiness.com"/>
        <button class="btn" id="reqBtn" onclick="requestLink()">Send my secure link</button>
      </div>

      <!-- dashboard -->
      <div id="dashView" class="hidden">
        <p class="status">Signed in as <span class="b" id="whoEmail"></span></p>
        <div class="tiles">
          <a class="tile" id="editSite">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></div>
            <div><h3>Edit my website</h3><p>Swap photos, request changes, update details</p></div>
            <span class="arw">→</span>
          </a>
          <a class="tile hidden" id="editRecep">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2"><path d="M3 5h18M3 12h18M3 19h12"/></svg></div>
            <div><h3>Receptionist settings</h3><p>Greeting, services, transfer rules</p></div>
            <span class="arw">→</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
<footer>&copy; 2026 ScalingSOS</footer>

<script>
window.SSOS_FN = { N8N:'https://n8n.americanlifeteam.com/webhook' };
(function(){
  var N8N=window.SSOS_FN.N8N;
  var qs=new URLSearchParams(location.search);
  var token=qs.get('token')||'';
  var presetEmail=qs.get('email')||'';
  var msg=document.getElementById('msg');
  function show(t,cls){ msg.textContent=t; msg.className='msg '+cls; }

  function showDashboard(email, intake, boughtRecep){
    document.getElementById('requestView').classList.add('hidden');
    document.getElementById('dashView').classList.remove('hidden');
    document.getElementById('title').textContent='Welcome back';
    document.getElementById('subtitle').textContent='Make changes anytime — everything saves automatically.';
    document.getElementById('whoEmail').textContent=email;
    var e=encodeURIComponent(email);
    document.getElementById('editSite').setAttribute('href','/setup/?email='+e);
    if(boughtRecep){
      var r=document.getElementById('editRecep'); r.classList.remove('hidden');
      r.setAttribute('href','/setup/?email='+e+'&recep=1');
    }
    try{ localStorage.setItem('ssos_email', email); }catch(e2){}
  }

  if(token){
    show('Verifying your link…','ok');
    fetch(N8N+'/ssos-funnel-magic-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token})})
      .then(function(r){return r.json()}).then(function(d){
        if(d&&d.ok){ msg.className='msg'; showDashboard(d.email, d.intake||{}, !!d.bought_receptionist); }
        else { show('That link has expired or was already used. Enter your email below for a fresh one.','err'); }
      }).catch(function(){ show('Could not verify right now. Enter your email below for a new link.','err'); });
  } else if(presetEmail){
    document.getElementById('email').value=presetEmail;
  }

  window.requestLink=function(){
    var email=(document.getElementById('email').value||'').trim();
    if(!email||email.indexOf('@')<0){ show('Please enter a valid email.','err'); return; }
    var btn=document.getElementById('reqBtn'); btn.disabled=true; btn.textContent='Sending…';
    fetch(N8N+'/ssos-funnel-magic-request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})})
      .then(function(r){return r.json()}).then(function(d){
        show('Check your inbox — we sent a secure sign-in link to '+email+'. It is good for 30 minutes.','ok');
        btn.textContent='Link sent';
      }).catch(function(){ show('Could not send the link right now. Please try again.','err'); btn.disabled=false; btn.textContent='Send my secure link'; });
  };
})();
</script>
</body>
</html>
